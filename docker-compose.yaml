version: '3.8'

services:
  # PostgreSQL with pgvector extension (Production Database)
  postgres:
    image: pgvector/pgvector:pg18
    container_name: gsrs-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gsrs_secure_password_change_me}
      POSTGRES_DB: gsrs_rag
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gsrs"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    profiles:
      - postgres

  # GSRS RAG Gateway API
  rag-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gsrs-rag-gateway
    environment:
      # Database URL - scheme determines backend automatically:
      # - PostgreSQL: postgresql://user:pass@host:port/dbname
      # - ChromaDB: chroma://./chroma_data/chunks
      # For PostgreSQL (production):
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:${POSTGRES_PASSWORD:-gsrs_secure_password_change_me}@postgres:5432/gsrs_rag}
      # For ChromaDB (development - uncomment to use):
      # DATABASE_URL: chroma://./chroma_data/chunks
      # Embedding API Configuration
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_URL: ${EMBEDDING_URL:-https://api.openai.com/v1/embeddings}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1536}
      # Authentication
      API_USERNAME: ${API_USERNAME:-admin}
      API_PASSWORD: ${API_PASSWORD:-admin123}
      # API Configuration
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DEFAULT_TOP_K: 5
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    profiles:
      - postgres
      - chroma

  # Optional: Open WebUI for LLM interface
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: gsrs-open-webui
    environment:
      # Ollama configuration - use host.docker.internal for local Ollama
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-gsrs_secret_key_change_me_in_production}
      WEBUI_AUTH: ${WEBUI_AUTH:-true}
    ports:
      - "3000:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - rag-gateway
    volumes:
      - open-webui_data:/app/backend/data
      # Mount GSRS RAG Gateway tool (uncomment to enable)
      # - ./examples/gsrs_tool.py:/app/backend/tools/gsrs_tool.py
      # Mount GSRS RAG Gateway tool (uncomment to enable)
      # - ./examples/gsrs_function.py:/app/backend/functions/gsrs_function.py
    profiles:
      - ollama
    restart: unless-stopped

volumes:
  postgres_data:
  open-webui_data:

networks:
  default:
    name: gsrs-network
